# MobHUD - Configuración Principal v2.0
# Plugin hecho para servidores Java + Bedrock
# Ahora con Hologramas y Niveles de Mobs

# ===== AJUSTES GENERALES =====
general:
  # ¿Mostrar la vida en la barra de acción al dañar?
  mostrar-al-danar: true
  
  # ¿Mostrar también al mirar al mob? (puede consumir más recursos)
  mostrar-al-mirar: false
  
  # ¿Mostrar mensaje de EXP obtenida al matar?
  mostrar-exp: true
  
  # ¿Mostrar holograma sobre la cabeza del mob?
  mostrar-holograma: true
  
  # Tiempo en segundos que dura el holograma visible
  tiempo-holograma: 8

# ===== SISTEMA DE NIVELES =====
niveles:
  # ¿Activar sistema de niveles para mobs?
  habilitado: true
  
  # Distancia desde el spawn para subir 1 nivel (en bloques)
  distancia-por-nivel: 100
  
  # Variación aleatoria máxima (+/- niveles)
  variacion-maxima: 3
  
  # EXP extra por cada nivel del mob
  exp-por-nivel: 2

# ===== APARIENCIA =====
apariencia:
  # Símbolos para la barra de vida
  barra:
    lleno: "█"
    vacio: "▒"
    largo: 20
    
  # Colores según porcentaje de vida
  colores:
    alto: "&a"      # Verde (75-100%)
    medio: "&e"     # Amarillo (50-74%)
    bajo: "&6"      # Naranja (25-49%)
    critico: "&c"   # Rojo (0-24%)
  
  # Formato del holograma (soporta %nivel%, %nombre%, %vida%, %vida_max%)
  formato-holograma-linea1: "&6[Nv.%nivel%] &e%nombre%"
  formato-holograma-linea2: "%barra% &7%vida%/%vida_max%❤"

# ===== MOBS EXCLUIDOS =====
# Mobs que NO mostrarán su información
mobs-excluidos:
  - "ENDER_DRAGON"
  - "WITHER"
  - "WARDEN"

# ===== MUNDOS DESHABILITADOS =====
# Mundos donde el plugin NO funcionará
mundos-deshabilitados:
  - "world_spawn_protegido"
  - "minijuegos"

# ===== MENSAJES (Soporta códigos de color &) =====
mensajes:
  # %exp% = experiencia, %mob% = nombre del mob, %nivel% = nivel del mob
  exp-obtenida: "&a+%exp% EXP &7de &f%mob% &6[Nv.%nivel%]"
  sin-permiso: "&cNo tienes permiso para ver esto."
  recargado: "&aMobHUD v2.0 recargado correctamente."